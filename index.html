    <style>
        /* จัด Layout ให้ทุกแถวมีขนาดเท่ากันเป๊ะ */
        /* แถวแรกที่มีปุ่มลบไม่ได้แสดง จะใช้ empty div หรือ display แบบนี้แทน */
        .flight-row { 
            display: grid; 
            grid-template-columns: 1fr 90px 30px; /* 1fr สำหรับไฟล์ท, 90px สำหรับราคา, 30px สำหรับปุ่มกากบาท */
            gap: 8px; 
            align-items: center; 
            margin-bottom: 8px;
        }

        .choices { width: 100% !important; margin-bottom: 0 !important; }
        .choices__inner { 
            border-radius: 12px !important; 
            border: 2px solid #e5e7eb !important; 
            padding: 8px 12px !important; 
            min-height: 50px !important; 
            display: flex; 
            align-items: center;
        }
        
        .choices__list--dropdown { border-radius: 12px !important; margin-top: 5px; box-shadow: 0 10px 15px rgba(0,0,0,0.1); }
        .choices__list--dropdown .choices__item--selectable { padding: 14px 16px !important; font-size: 15px !important; }
        .choices__list--dropdown .choices__group-heading { font-size: 12px !important; padding: 10px 16px !important; color: #2563eb; background: #eff6ff; }
        
        /* ช่องราคาที่คงขนาดไว้ที่ 90px เพื่อให้เท่ากันทุกแถว */
        .flight-price { 
            width: 100% !important; 
            padding: 10px 8px !important; 
            font-size: 14px !important; 
            border: 2px solid #e5e7eb; 
            border-radius: 12px; 
            background: #f9fafb; 
            text-align: right; 
            font-weight: bold; 
        }
    </style>
</head>

<script>
    // 1. ฟังก์ชันตั้งค่า Choices.js
    function initChoices(element) { 
        return new Choices(element, { searchEnabled: true, itemSelectText: '', shouldSort: false, position: 'bottom' }); 
    }

    // 2. ฟังก์ชันบันทึกข้อมูล (รวม Note ด้วย)
    function saveData() { 
        const flights = Array.from(document.querySelectorAll('.flight-select')).map(s => s.value); 
        localStorage.setItem('baseSalary', document.getElementById('baseSalary').value); 
        localStorage.setItem('note', document.getElementById('note').value);
        localStorage.setItem('flights', JSON.stringify(flights)); 
    }

    // 3. ฟังก์ชัน Copy Summary
    function copySummary() {
        const total = document.getElementById('totalAmount').innerText;
        const note = document.getElementById('note').value || "No note";
        const text = `Allowance Summary: ${note}\nTotal: ${total} THB`;
        navigator.clipboard.writeText(text).then(() => {
            alert("Summary copied to clipboard!");
        });
    }

    // 4. ฟังก์ชันคำนวณราคา
    function updatePrice(selectElement) { 
        const row = selectElement.closest('.flight-row'); 
        const priceInput = row.querySelector('.flight-price'); 
        priceInput.value = parseFloat(selectElement.value).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2}); 
        calculate(); 
    }

    function calculate() { 
        let base = parseFloat(document.getElementById('baseSalary').value) || 0; 
        let total = base; 
        document.querySelectorAll('.flight-price').forEach(input => { 
            total += parseFloat(input.value.replace(/,/g, '')) || 0; 
        }); 
        document.getElementById('totalAmount').innerText = total.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2}); 
    }

    // 5. ฟังก์ชันเพิ่มแถวใหม่
    function addFlightRow(selectedValue = "0") {
        const container = document.getElementById('flightContainer');
        const newRow = document.createElement('div');
        newRow.className = 'flight-row';
        const optionsHTML = document.querySelector('.flight-select').innerHTML;
        
        newRow.innerHTML = `
            <select class="flight-select" onchange="updatePrice(this); saveData();">${optionsHTML}</select>
            <input type="text" class="flight-price" value="0" readonly>
            <button onclick="this.parentElement.remove(); calculate(); saveData();" class="text-red-400 font-bold text-xl">×</button>
        `;
        
        container.appendChild(newRow);
        const sel = newRow.querySelector('.flight-select');
        sel.value = selectedValue;
        initChoices(sel);
        updatePrice(sel);
    }

    // 6. เมื่อโหลดหน้าเว็บเสร็จ (โหลดค่า Note เพิ่มเติม)
    window.onload = () => {
        const savedSalary = localStorage.getItem('baseSalary');
        const savedNote = localStorage.getItem('note');
        if (savedSalary) document.getElementById('baseSalary').value = savedSalary;
        if (savedNote) document.getElementById('note').value = savedNote;
        
        const savedFlights = JSON.parse(localStorage.getItem('flights'));
        if (savedFlights && savedFlights.length > 0) {
            savedFlights.forEach((val, index) => {
                if(index === 0) { 
                    const firstSelect = document.querySelector('.flight-select'); 
                    firstSelect.value = val; 
                    updatePrice(firstSelect); 
                } else { 
                    addFlightRow(val); 
                }
            });
        }
        calculate();
    };

    // 7. ปุ่มกดต่างๆ
    document.getElementById('addFlightBtn').addEventListener('click', () => addFlightRow());
    document.getElementById('resetBtn').addEventListener('click', () => { 
        if(confirm("Are you sure? This will clear all your data.")) {
            localStorage.clear(); 
            location.reload(); 
        }
    });

    initChoices(document.querySelector('.flight-select'));
</script>
