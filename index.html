        <button id="addFlightBtn" class="w-full mt-4 border-2 border-dashed border-gray-300 p-2 rounded text-gray-500 hover:bg-gray-100">
            + Add flight
        </button>

        <div class="mt-6 p-4 bg-blue-50 rounded-xl text-center">
            <p class="text-sm text-blue-600">Total Amount:</p>
            <span id="totalAmount" class="text-3xl font-bold text-blue-700">0</span>
        </div>
    </div>

    <script>
        function updatePrice(select) {
            const row = select.parentElement;
            const priceInput = row.querySelector('.flight-price');
            priceInput.value = select.value;
            calculate();
        }

        function calculate() {
            let base = parseFloat(document.getElementById('baseSalary').value) || 0;
            let total = base;
            document.querySelectorAll('.flight-price').forEach(input => {
                total += parseFloat(input.value) || 0;
            });
            document.getElementById('totalAmount').innerText = total.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
        }

        document.getElementById('addFlightBtn').addEventListener('click', () => {
            const container = document.getElementById('flightContainer');
            const newRow = document.createElement('div');
            newRow.className = 'flight-row flex gap-2 items-center';
            newRow.innerHTML = `
                <select class="flight-select w-full border p-2 rounded" onchange="updatePrice(this)">
                    <option value="0">Select a flight...</option>
                    <optgroup label="CLMV">
                        <option value="3950">301 - RGN (3,950)</option>
                        <option value="3657.5">303 - RGN (3,657.5)</option>
                    </optgroup>
                    <optgroup label="Domestic">
                        <option value="3430">002 - UTH (3,430)</option>
                        <option value="3592.5">102 - CNX (3,592.5)</option>
                    </optgroup>
                </select>
                <input type="number" class="flight-price w-24 border p-2 rounded bg-gray-100 text-right" value="0" readonly>
                <button onclick="this.parentElement.remove(); calculate();" class="text-red-500 font-bold px-2">×</button>
            `;
            container.appendChild(newRow);
        });
    </script>
</body>
</html>
