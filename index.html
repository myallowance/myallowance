<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Allowance App</title>
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3067/3067423.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>
    <style>
        .flight-row { display: grid; grid-template-columns: 1fr 90px 30px; gap: 8px; align-items: center; }
        .choices { width: 100% !important; margin-bottom: 0 !important; }
        .choices__inner { 
            border-radius: 12px !important; border: 2px solid #e5e7eb !important; 
            padding: 8px 12px !important; min-height: 50px !important; display: flex; align-items: center;
        }
        .choices__list--dropdown { border-radius: 12px !important; margin-top: 5px; box-shadow: 0 10px 15px rgba(0,0,0,0.1); }
        .choices__list--dropdown .choices__item--selectable { padding: 14px 16px !important; font-size: 15px !important; }
        .choices__list--dropdown .choices__group-heading { font-size: 12px !important; padding: 10px 16px !important; color: #2563eb; background: #eff6ff; }
        .flight-price { width: 100% !important; padding: 10px 5px !important; font-size: 14px !important; border: 2px solid #e5e7eb; border-radius: 12px; background: #f9fafb; text-align: right; font-weight: bold; }
    </style>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-md mx-auto bg-white rounded-3xl shadow-xl p-6">
        <h1 class="text-2xl font-black mb-6 text-gray-800">Allowance</h1>

        <div class="mb-6">
            <label class="block font-bold mb-2 text-gray-400 text-[11px] uppercase tracking-widest">Base Salary (THB)</label>
            <input id="baseSalary" type="number" inputmode="decimal" class="w-full border-2 border-gray-100 p-4 rounded-2xl text-xl font-bold" placeholder="0" oninput="calculate(); saveData();">
        </div>

        <div id="flightContainer" class="space-y-4">

                        <option value="3560.00">136 - CEI</option>
                        <option value="3982.50">203/205/217/221 - HKT</option>
                        <option value="3592.50">241 - KBV</option>
                        <option value="5315.00">020/106 - UBP/CNX</option>
                        <option value="4730.00">040/042 - KKC/KKC</option>
                        <option value="5347.50">044/267 - KKC/HDY</option>

                        <option value="5445.00">110/249 - CNX/KBV</option>

                        <option value="5380.00">201/004 - HKT/UTH</option>
                        <option value="5445.00">207/028 - HKT/UBP</option>
                        <option value="4860.00">211/120 - HKT/CNX</option>

                        <option value="5282.50">263/046 - HDY/KKC</option>
                    </optgroup>
                    <optgroup label="CHINA">
                        <option value="6647.5">608 - SZX</option>
                        <option value="5997.5">618 - TFU</option>
                        <option value="6615">630 - KHH</option>
                        <option value="6907.5">694 - CSX</option>
                    </optgroup>
                    <optgroup label="INDIA-PAKISTAN">

                        <option value="6225.00">620 - MNL</option>

                        <option value="6810.00">636 - TPE</option>
                        <option value="7525.00">662 - PVG</option>
                        <option value="7460.00">664 - PVG</option>

                <input type="text" class="flight-price w-24 p-4 border-2 border-gray-100 rounded-2xl bg-gray-50 text-right font-bold text-lg" value="0" readonly>
            </div>
        </div>

      <div class="flex gap-2 mt-6">
            <button id="addFlightBtn" class="flex-1 bg-gray-100 p-4 rounded-2xl font-bold text-gray-600 hover:bg-gray-200">+ Add</button>
            <button id="resetBtn" class="px-6 py-4 bg-red-50 text-red-500 rounded-2xl font-bold hover:bg-red-100">Reset</button>
        </div>

        <div class="mt-8 p-4 bg-purple-600 rounded-2xl text-center shadow-lg">
            <p class="text-purple-100 text-[9px] font-bold uppercase tracking-widest">Total Amount (THB)</p>
            <span id="totalAmount" class="text-3xl font-black text-white">0.00</span>
        </div>

        <p class="mt-8 text-center text-gray-400 text-[10px] italic">This is just an estimation. There might be some discrepancies xoxo.</p>
        
        <div class="mt-4 p-4 bg-gray-50 rounded-2xl border border-gray-100">
            <p class="text-[11px] text-gray-500 text-center">Install: Tap <strong>Share</strong> > <strong>"Add to Home Screen"</strong>.</p>
        </div>
    </div>

<script>
    function initChoices(element) { return new Choices(element, { searchEnabled: true, itemSelectText: '', shouldSort: false, position: 'bottom' }); }
    function saveData() { const flights = Array.from(document.querySelectorAll('.flight-select')).map(s => s.value); localStorage.setItem('baseSalary', document.getElementById('baseSalary').value); localStorage.setItem('flights', JSON.stringify(flights)); }
    
    window.onload = () => {
        const savedSalary = localStorage.getItem('baseSalary');
        if (savedSalary) document.getElementById('baseSalary').value = savedSalary;
        const savedFlights = JSON.parse(localStorage.getItem('flights'));
        if (savedFlights && savedFlights.length > 0) {
            savedFlights.forEach((val, index) => {
                if(index === 0) { const firstSelect = document.querySelector('.flight-select'); firstSelect.value = val; updatePrice(firstSelect); }
                else { addFlightRow(val); }
            });
        }
        calculate();
    };

    function updatePrice(selectElement) { const row = selectElement.closest('.flight-row'); const priceInput = row.querySelector('.flight-price'); priceInput.value = parseFloat(selectElement.value).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2}); calculate(); }
    function calculate() { let base = parseFloat(document.getElementById('baseSalary').value) || 0; let total = base; document.querySelectorAll('.flight-price').forEach(input => { total += parseFloat(input.value.replace(/,/g, '')) || 0; }); document.getElementById('totalAmount').innerText = total.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2}); }

    function addFlightRow(selectedValue = "0") {
        const container = document.getElementById('flightContainer');
        const newRow = document.createElement('div');
        newRow.className = 'flight-row';
        const originalSelect = document.querySelector('.flight-select');
        newRow.innerHTML = `
            <select class="flight-select" onchange="updatePrice(this); saveData();">${originalSelect.innerHTML}</select>
            <input type="text" class="flight-price" value="0" readonly>
            <button onclick="this.parentElement.remove(); calculate(); saveData();" class="text-red-400 font-bold">×</button>
        `;
        container.appendChild(newRow);
        const sel = newRow.querySelector('.flight-select');
        sel.value = selectedValue;
        initChoices(sel);
        updatePrice(sel);
    }

    document.getElementById('addFlightBtn').addEventListener('click', () => addFlightRow());
    document.getElementById('resetBtn').addEventListener('click', () => { localStorage.clear(); location.reload(); });
    initChoices(document.querySelector('.flight-select'));
</script>
</body>
</html>
